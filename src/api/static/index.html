<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>다이캐스팅 정상/불량 예측 데모</title>
  <style>
    :root {
      --navy: #1f3a5f;
      --navy-dark: #16293f;
      --bg: #f4f6f9;
      --card: #ffffff;
      --border: #e2e7ee;
      --muted: #6b7785;
      --normal: #2e7d32;
      --normal-bg: #e8f5e9;
      --defect: #c62828;
      --defect-bg: #fdecea;
      --shadow: 0 2px 10px rgba(31, 58, 95, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "Malgun Gothic", sans-serif;
      background: var(--bg);
      color: #233140;
      line-height: 1.5;
    }
    header {
      background: var(--navy);
      color: #fff;
      padding: 22px 28px;
    }
    header h1 { margin: 0; font-size: 20px; font-weight: 700; }
    header p { margin: 4px 0 0; font-size: 13px; color: #c7d3e3; }
    .wrap { max-width: 980px; margin: 24px auto; padding: 0 20px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width: 760px) { .grid { grid-template-columns: 1fr; } }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: var(--shadow);
      padding: 20px;
    }
    .card h2 { margin: 0 0 14px; font-size: 15px; color: var(--navy); }
    label { font-size: 13px; color: var(--muted); display: block; margin-bottom: 6px; }
    select, button {
      width: 100%;
      padding: 11px 12px;
      font-size: 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
    }
    select { background: #fff; }
    button {
      margin-top: 14px;
      background: var(--navy);
      color: #fff;
      border: none;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: var(--navy-dark); }
    button:disabled { background: #9aa7b6; cursor: wait; }
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }
    .badge.normal { background: var(--normal-bg); color: var(--normal); }
    .badge.defect { background: var(--defect-bg); color: var(--defect); }
    .truth { margin: 10px 0 0; font-size: 13px; color: var(--muted); }
    .feat-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 8px; }
    .feat-table td { padding: 5px 6px; border-bottom: 1px solid #f0f2f6; }
    .feat-table td:last-child { text-align: right; font-variant-numeric: tabular-nums; color: var(--navy); font-weight: 600; }
    details { margin-top: 10px; }
    summary { cursor: pointer; font-size: 13px; color: var(--navy); }
    /* result */
    #result { margin-top: 20px; }
    .result-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 20px; border-radius: 12px; margin-bottom: 16px;
    }
    .result-head.normal { background: var(--normal-bg); }
    .result-head.defect { background: var(--defect-bg); }
    .result-label { font-size: 28px; font-weight: 800; }
    .result-label.normal { color: var(--normal); }
    .result-label.defect { color: var(--defect); }
    .match { font-size: 13px; font-weight: 600; }
    .match.ok { color: var(--normal); }
    .match.no { color: var(--defect); }
    .prob-row { margin: 12px 0; }
    .prob-row .top { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 4px; }
    .bar { height: 12px; border-radius: 6px; background: #eef1f5; overflow: hidden; }
    .bar > span { display: block; height: 100%; border-radius: 6px; }
    .bar .fill-normal { background: var(--normal); }
    .bar .fill-defect { background: var(--defect); }
    .top-feats { margin-top: 16px; }
    .top-feats h3 { font-size: 14px; color: var(--navy); margin: 0 0 8px; }
    .meta { margin-top: 16px; font-size: 12px; color: var(--muted); }
    .meta code { background: #eef1f5; padding: 1px 6px; border-radius: 4px; }
    .hint { font-size: 13px; color: var(--muted); }
    .err { color: var(--defect); font-size: 13px; }
  </style>
</head>
<body>
  <header>
    <h1>다이캐스팅 정상/불량 예측 데모</h1>
    <p id="subtitle">모델 정보를 불러오는 중…</p>
  </header>

  <div class="wrap">
    <div class="grid">
      <div class="card">
        <h2>1. 공정 샘플 선택</h2>
        <label for="sampleSelect">test set 실제 샘플 (모델이 올바르게 분류한 예시)</label>
        <select id="sampleSelect"></select>
        <p class="truth" id="truthLine"></p>
        <button id="predictBtn" onclick="runPredict()">예측 실행</button>
        <p class="err" id="errLine"></p>
        <details>
          <summary>입력 feature 값 전체 보기 (28개)</summary>
          <table class="feat-table" id="inputTable"></table>
        </details>
      </div>

      <div class="card">
        <h2>2. 예측 결과</h2>
        <p class="hint" id="placeholder">샘플을 선택하고 <b>예측 실행</b>을 누르면 결과가 표시됩니다.</p>
        <div id="result" style="display:none;">
          <div class="result-head" id="resultHead">
            <span class="result-label" id="resultLabel"></span>
            <span class="match" id="matchBadge"></span>
          </div>
          <div class="prob-row">
            <div class="top"><span>정상 (normal)</span><span id="pNormalTxt"></span></div>
            <div class="bar"><span class="fill-normal" id="pNormalBar"></span></div>
          </div>
          <div class="prob-row">
            <div class="top"><span>불량 (defect)</span><span id="pDefectTxt"></span></div>
            <div class="bar"><span class="fill-defect" id="pDefectBar"></span></div>
          </div>
          <div class="top-feats">
            <h3>주요 판단 변수 (importance · 입력값)</h3>
            <table class="feat-table" id="topFeatTable"></table>
          </div>
          <div class="meta" id="metaLine"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let SAMPLES = [];
    let THRESHOLD = 0.5;

    async function init() {
      try {
        const info = await (await fetch("/model-info")).json();
        THRESHOLD = info.decision_threshold ?? 0.5;
        document.getElementById("subtitle").textContent =
          `모델 ${info.model_version} · 데이터 ${info.data_version} · 판정 임계값 ${THRESHOLD}`;
      } catch (e) {
        document.getElementById("subtitle").textContent = "모델 정보를 불러오지 못했습니다.";
      }
      try {
        const data = await (await fetch("/samples")).json();
        SAMPLES = data.samples || [];
        const sel = document.getElementById("sampleSelect");
        SAMPLES.forEach((s, i) => {
          const opt = document.createElement("option");
          opt.value = i;
          const ko = s.true_label === "defect" ? "불량" : "정상";
          opt.textContent = `${s.id}  (실제: ${ko})`;
          sel.appendChild(opt);
        });
        sel.onchange = onSampleChange;
        onSampleChange();
      } catch (e) {
        document.getElementById("errLine").textContent = "샘플 목록을 불러오지 못했습니다.";
      }
    }

    function onSampleChange() {
      const s = SAMPLES[document.getElementById("sampleSelect").value];
      if (!s) return;
      const ko = s.true_label === "defect" ? "불량" : "정상";
      const cls = s.true_label === "defect" ? "defect" : "normal";
      document.getElementById("truthLine").innerHTML =
        `이 샘플의 실제 정답: <span class="badge ${cls}">${ko}</span> (test row #${s.test_row_index})`;
      const tbl = document.getElementById("inputTable");
      tbl.innerHTML = "";
      Object.entries(s.features).forEach(([k, v]) => {
        tbl.insertAdjacentHTML("beforeend", `<tr><td>${k}</td><td>${v}</td></tr>`);
      });
    }

    async function runPredict() {
      const s = SAMPLES[document.getElementById("sampleSelect").value];
      if (!s) return;
      const btn = document.getElementById("predictBtn");
      const err = document.getElementById("errLine");
      err.textContent = "";
      btn.disabled = true;
      btn.textContent = "예측 중…";
      try {
        const res = await fetch("/predict", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ features: s.features }),
        });
        if (!res.ok) throw new Error("HTTP " + res.status);
        render(await res.json(), s);
      } catch (e) {
        err.textContent = "예측 요청 실패: " + e.message;
      } finally {
        btn.disabled = false;
        btn.textContent = "예측 실행";
      }
    }

    function render(r, s) {
      document.getElementById("placeholder").style.display = "none";
      document.getElementById("result").style.display = "block";
      const isDefect = r.prediction === 1;
      const cls = isDefect ? "defect" : "normal";
      const ko = isDefect ? "불량" : "정상";

      document.getElementById("resultHead").className = "result-head " + cls;
      const labelEl = document.getElementById("resultLabel");
      labelEl.className = "result-label " + cls;
      labelEl.textContent = ko + " (" + r.label_name + ")";

      const correct = r.label_name === s.true_label;
      const m = document.getElementById("matchBadge");
      m.className = "match " + (correct ? "ok" : "no");
      m.textContent = correct ? "✓ 실제 정답과 일치" : "✗ 실제 정답과 불일치";

      const pn = r.probability.normal, pd = r.probability.defect;
      document.getElementById("pNormalTxt").textContent = (pn * 100).toFixed(1) + "%";
      document.getElementById("pDefectTxt").textContent = (pd * 100).toFixed(1) + "%";
      document.getElementById("pNormalBar").style.width = (pn * 100).toFixed(1) + "%";
      document.getElementById("pDefectBar").style.width = (pd * 100).toFixed(1) + "%";

      const tf = document.getElementById("topFeatTable");
      tf.innerHTML = "";
      r.top_features.forEach((f) => {
        tf.insertAdjacentHTML(
          "beforeend",
          `<tr><td>${f.feature}<br><span style="color:#9aa7b6;font-size:11px;">중요도 ${f.importance.toFixed(4)}</span></td><td>${f.input_value}</td></tr>`
        );
      });
      document.getElementById("metaLine").innerHTML =
        `모델 <code>${r.model_version}</code> · 데이터 <code>${r.data_version}</code>`;
    }

    init();
  </script>
</body>
</html>
