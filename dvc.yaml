stages:
  prepare_data:
    cmd: python -m src.data.prepare_data
    deps:
      - data/raw/DieCasting_Quality_Raw_Data_product1.csv
      - src/data/prepare_data.py
      - configs/params.yaml
    outs:
      - data/processed/diecasting_product1_binary.csv
      - data/processed/train.csv
      - data/processed/valid.csv
      - data/processed/test.csv
      - artifacts/reports/data_profile.json
      - artifacts/plots/eda_class_distribution.png
      - artifacts/plots/eda_feature_distributions.png
      - artifacts/plots/eda_feature_boxplots.png
      - artifacts/plots/eda_correlation_heatmap.png

  train_binary:
    cmd: python -m src.models.train_binary
    deps:
      - data/processed/train.csv
      - data/processed/valid.csv
      - data/processed/test.csv
      - src/models/train_binary.py
      - configs/params.yaml
    outs:
      - artifacts/models/rf_baseline.joblib
      - artifacts/models/rf_baseline_metadata.json
      - artifacts/reports/rf_baseline_metrics.json
      - artifacts/reports/rf_baseline_feature_importance.json
      - artifacts/plots/rf_baseline_confusion_matrix.png
      - artifacts/plots/rf_baseline_roc_curve.png
      - artifacts/plots/rf_baseline_feature_importance.png

  compare_baselines_xai:
    cmd: python -m src.models.compare_baselines_xai
    deps:
      - data/processed/train.csv
      - data/processed/valid.csv
      - data/processed/test.csv
      - artifacts/models/rf_baseline.joblib
      - src/models/compare_baselines_xai.py
      - configs/params.yaml
    outs:
      - artifacts/models/baseline_candidate.joblib
      - artifacts/models/baseline_candidate_metadata.json
      - artifacts/reports/baseline_comparison.csv
      - artifacts/reports/baseline_comparison.json
      - artifacts/reports/baseline_metric_table.md
      - artifacts/reports/candidate_handoff_note.md
      - artifacts/reports/xai_feature_interpretation.csv
      - artifacts/reports/xai_feature_interpretation.json
      - artifacts/reports/xai_feature_interpretation.md
      - artifacts/reports/shap_local_explanation.json
      - artifacts/reports/shap_local_explanation.md
      - artifacts/plots/baseline_validation_metrics.png
      - artifacts/plots/baseline_confusion_matrices.png
      - artifacts/plots/shap_summary_bar.png
      - artifacts/plots/shap_beeswarm.png
      - artifacts/plots/shap_waterfall_defect_sample.png
      - artifacts/reports/baseline_xai_report.md

  tune_logistic:
    cmd: python -m src.models.tune_logistic
    deps:
      - data/processed/train.csv
      - data/processed/valid.csv
      - data/processed/test.csv
      - artifacts/models/baseline_candidate.joblib
      - artifacts/models/baseline_candidate_metadata.json
      - src/models/tune_logistic.py
      - configs/params.yaml
    outs:
      - artifacts/models/model.joblib
      - artifacts/models/metadata.json
      - artifacts/reports/metrics.json
      - artifacts/reports/feature_importance.json
      - artifacts/reports/sample_inputs.json
      - artifacts/reports/normal_request.json
      - artifacts/reports/defect_request.json
      - artifacts/reports/logistic_tuning_results.csv
      - artifacts/reports/logistic_tuning_report.md
      - artifacts/reports/logistic_threshold_results.csv
      - artifacts/reports/logistic_coefficients.json
      - artifacts/reports/logistic_permutation_importance.json
      - artifacts/plots/confusion_matrix.png
      - artifacts/plots/roc_curve.png
      - artifacts/plots/feature_importance.png
      - artifacts/plots/logistic_threshold_tuning.png
